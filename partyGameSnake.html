<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Village</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="headerstyles.css">
    <link rel="stylesheet" href="navstyles.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #main-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('image.png') no-repeat center center fixed;
            background-size: cover;
            filter: blur(8px);
        }

        #sidebar {
            width: 180px;
            background-color: rgba(104, 86, 82, 0.8);
            color: #f0e6d2;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: sticky;
            top: 160px;
            left: 0;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            height: auto;
            align-self: flex-start;
            padding-top: 30px;
        }

        #sidebar button {
            background-color: #f0e6d2;
            border: none;
            border-radius: 5px;
            padding: 10px;
            color: #685652;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #sidebar button:hover {
            background-color: #ecd7ae;
        }

        #content {
            margin-left: 220px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.85);
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
            max-width: 1000px;
            margin: 20px auto;
            position: relative;
            top: 10px;
            flex-grow: 1;
            height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 1px solid #000;
        }

        .buttons {
            margin-top: 1rem;
        }

        .buttons button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            margin: 0 0.5rem;
            cursor: pointer;
            border-radius: 0.5rem;
        }

        .buttons button:hover {
            background-color: #45a049;
        }

        .score {
            font-size: 1rem;
            margin-top: 1rem;
        }

        footer {
            background-color: rgba(104, 86, 82, 0.8);
            text-align: center;
            color: #f0e6d2;
            padding: 10px;
            font-size: 14px;
            position: relative; /* 푸터가 콘텐츠 아래에 위치하도록 조정 */
            margin-top: auto; /* 콘텐츠를 밀어내고 하단에 위치 */
            width: 100%; /* 화면 너비에 맞게 확장 */
        }

        #groupName {
            text-align: center; /* 텍스트 중앙 정렬 */
            font-size: 20px; /* 글자 크기 */
            font-weight: bold; /* 글자 두껍게 */
            color: #f0e6d2; /* 텍스트 색상 */
            margin-bottom: 20px; /* 버튼들과의 간격 */
            padding: 15px; /* 내부 여백 추가 */
            background-color: rgba(104, 86, 82, 0.9); /* 배경색 설정 */
            border-radius: 10px; /* 상자 모서리를 둥글게 설정 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* 그림자 효과 */
            display: flex; /* 플렉스 컨테이너 설정 */
            flex-direction: column; /* 텍스트를 세로로 배치 */
            align-items: center; /* 세로 중앙 정렬 */
            justify-content: center; /* 가로 중앙 정렬 */
            width: 100%; /* 사이드바 너비에 맞게 확장 */
            box-sizing: border-box; /* 패딩 포함 크기 계산 */
        }

        #groupName h3 {
            margin: 0; /* 제목의 기본 여백 제거 */
            font-size: 20px; /* 제목의 글자 크기 */
        }

        #groupName p {
            margin: 5px 0 0; /* 텍스트 간격 조정 (위, 아래) */
            font-size: 16px; /* 두 번째 줄 텍스트 크기 */
            color: #f0e6d2; /* 텍스트 색상 */
            font-weight: bold; /* 제목을 두껍게 */
        }
    </style>
</head>
<body>
<div class="background"></div>
<header>
    <h1>Study Village</h1>
    <div class="auth-buttons">
        <button onclick="window.location.href='mainPage.html';">Logout</button>
    </div>
    <div class="profile-container">
        <i class="fas fa-user-circle profile-icon"></i>
    </div>
</header>
<nav>
    <a href="#">Board</a>
    <a href="#">File</a>
    <a href="#">Chat</a>
    <a href="#">Game</a>
    <a href="#">Setting</a>
</nav>
<div id="main-layout">
    <div id="sidebar">
        <div id="groupName">
            <h3>Group</h3>
            <p>A</p>
        </div>
        <button>계산기</button>
        <button>그래프</button>
        <button>수식변환</button>
        <button>사전</button>
        <button>맞춤법</button>
    </div>
    <div id="content">
        <h1 style="text-align: center; font-size: 32px; color: #333; margin: 10px 0;">Snake Game</h1>
        <canvas id="game-board" width="600" height="600"></canvas>
        <div class="buttons">
            <button id="start-btn">시작</button>
            <button id="stop-btn">정지</button>
        </div>
        <p class="score">점수: <span id="score">0</span></p>
    </div>
</div>
<footer>
    &copy; 2024 Study Village. All rights reserved.
</footer>
<script>
    const canvas = document.getElementById("game-board");
    const ctx = canvas.getContext("2d");
    const scale = 20;
    const rows = canvas.height / scale;
    const columns = canvas.width / scale;
    let score = 0;

    let snake;
    let fruit;
    let gameInterval;

    function setup() {
        snake = new Snake();
        fruit = new Fruit();
        fruit.pickLocation();
    }

    function startGame() {
        if (!gameInterval) {
            gameInterval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fruit.draw();
                snake.update();
                snake.draw();

                if (snake.eat(fruit)) {
                    score++;
                    document.getElementById("score").textContent = score;
                    fruit.pickLocation();
                }

                snake.checkCollision();
            }, 250);
        }
    }

    function stopGame() {
        clearInterval(gameInterval);
        gameInterval = null;
    }

    function gameOver() {
        alert("게임 오버! 점수: " + score);
        snake.reset();
        stopGame();
    }

    class Snake {
        constructor() {
            this.x = 0;
            this.y = 0;
            this.xSpeed = scale;
            this.ySpeed = 0;
            this.tail = [];
        }

        draw() {
            ctx.fillStyle = "#4CAF50";
            for (let i = 0; i < this.tail.length; i++) {
                ctx.fillRect(this.tail[i].x, this.tail[i].y, scale, scale);
            }
            ctx.fillRect(this.x, this.y, scale, scale);
        }

        update() {
            for (let i = 0; i < this.tail.length - 1; i++) {
                this.tail[i] = this.tail[i + 1];
            }
            this.tail[this.tail.length - 1] = { x: this.x, y: this.y };
            this.x += this.xSpeed;
            this.y += this.ySpeed;

            if (this.x < 0 || this.y < 0 || this.x >= canvas.width || this.y >= canvas.height) {
                gameOver();
            }
        }

        changeDirection(direction) {
            switch (direction) {
                case "Up":
                    this.xSpeed = 0;
                    this.ySpeed = -scale;
                    break;
                case "Down":
                    this.xSpeed = 0;
                    this.ySpeed = scale;
                    break;
                case "Left":
                    this.xSpeed = -scale;
                    this.ySpeed = 0;
                    break;
                case "Right":
                    this.xSpeed = scale;
                    this.ySpeed = 0;
                    break;
            }
        }

        eat(fruit) {
            if (this.x === fruit.x && this.y === fruit.y) {
                this.tail.push({ x: this.x - this.xSpeed, y: this.y - this.ySpeed });
                return true;
            }
            return false;
        }

        checkCollision() {
            for (let i = 0; i < this.tail.length; i++) {
                if (this.x === this.tail[i].x && this.y === this.tail[i].y) {
                    gameOver();
                }
            }
        }

        reset() {
            this.x = 0;
            this.y = 0;
            this.tail = [];
            this.xSpeed = scale;
            this.ySpeed = 0;
            score = 0;
            document.getElementById("score").textContent = score;
        }
    }

    class Fruit {
        constructor() {
            this.x = 0;
            this.y = 0;
        }

        pickLocation() {
            this.x = Math.floor(Math.random() * columns) * scale;
            this.y = Math.floor(Math.random() * rows) * scale;
        }

        draw() {
            ctx.fillStyle = "#FF4136";
            ctx.fillRect(this.x, this.y, scale, scale);
        }
    }

    window.addEventListener("keydown", (event) => {
        const direction = event.key.replace("Arrow", "");
        snake.changeDirection(direction);
    });

    document.getElementById("start-btn").addEventListener("click", startGame);
    document.getElementById("stop-btn").addEventListener("click", stopGame);

    setup();
</script>
</body>
</html>
