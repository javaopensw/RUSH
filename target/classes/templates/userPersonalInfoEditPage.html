<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 친화적인 화면 비율 설정 -->
    <title>Edit Personal Info</title>
    <!-- CSS 파일 포함 -->
    <link rel="stylesheet" href="/images/nav.css">
    <link rel="stylesheet" href="/images/Header.css">
    <link rel="stylesheet" href="/images/useredit.css"> <!-- 새로 만든 useredit.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="background"></div>

<!-- 고정된 컨테이너 -->
<div class="fixed-container">
    <!-- 헤더 영역 -->
    <header>
        <h1>Study Village</h1>
        <div class="auth-buttons">
            <button onclick="window.location.href='/index';">Logout</button>
        </div>
        <div class="profile-container">
            <i class="fas fa-user-circle profile-icon"></i>
        </div>
    </header>

    <!-- 네비게이션 영역 -->
    <nav>
        <a href="#">Board</a>
        <a href="#">File</a>
        <a href="#">Chat</a>
        <a href="#">Game</a>
        <a href="#">Setting</a>
    </nav>
</div>

<!-- 본문 컨테이너 -->
<div class="container">
    <h1>Edit Your Information</h1>
    <form action="/updatePersonalInfo" method="POST">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" th:value="${user.username}" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" th:value="${user.email}" required>
        <br><br>

        <label for="password">New Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter new password">
        <br><br>

        <button type="submit" class="btn">Save Changes</button>
    </form>
    <br>
    <a href="/userPersonalSettingPage">Cancel</a>
</div>

<!-- 푸터 영역 -->
<footer>
    &copy; 2024 Study Village. All rights reserved.
</footer>
</body>
</html>
